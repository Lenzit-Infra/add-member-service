name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Deploys are off by default. To turn them on:
    #   Repo Settings -> Secrets and variables -> Actions -> Variables -> New
    #   repository variable: DEPLOY_ENABLED = true
    # With that set, a push to main only deploys if the commit message
    # contains "[deploy]". Manual runs from the Actions tab (workflow_dispatch)
    # always work regardless of either gate.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true' && contains(github.event.head_commit.message, '[deploy]'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
